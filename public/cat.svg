<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <!-- Background -->
  <rect width="320" height="240" fill="#e8f4f8"/>
  
  <!-- Cat head -->
  <circle cx="160" cy="130" r="60" fill="#f4a460"/>
  
  <!-- Left ear -->
  <polygon points="130,80 110,40 135,70" fill="#f4a460"/>
  
  <!-- Right ear -->
  <polygon points="190,80 210,40 185,70" fill="#f4a460"/>
  
  <!-- Left eye -->
  <circle cx="145" cy="120" r="8" fill="#ffffff"/>
  <circle cx="145" cy="120" r="4" fill="#000000"/>
  
  <!-- Right eye -->
  <circle cx="175" cy="120" r="8" fill="#ffffff"/>
  <circle cx="175" cy="120" r="4" fill="#000000"/>
  
  <!-- Nose -->
  <polygon points="160,140 155,150 165,150" fill="#ff69b4"/>
  
  <!-- Mouth -->
  <path d="M 160 150 Q 150 160 145 155" stroke="#000000" fill="none" stroke-width="2"/>
  <path d="M 160 150 Q 170 160 175 155" stroke="#000000" fill="none" stroke-width="2"/>
  
  <!-- Left whisker -->
  <line x1="110" y1="130" x2="70" y2="125" stroke="#000000" stroke-width="1"/>
  
  <!-- Right whisker -->
  <line x1="210" y1="130" x2="250" y2="125" stroke="#000000" stroke-width="1"/>
</svg>
